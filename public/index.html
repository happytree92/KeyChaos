<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyChaos — Password Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #18181c;
      border: 1px solid #2a2a32;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; }
    .logo span { color: #7c6af7; }
    .tagline { color: #6b7280; margin-top: 8px; font-size: 0.95rem; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      background: #1f1f2e;
      border: 1px solid #7c6af7;
      color: #7c6af7;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .status {
      margin-top: 32px;
      background: #0f0f13;
      border: 1px solid #2a2a32;
      border-radius: 10px;
      padding: 20px;
    }
    .status-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.88rem; border-bottom: 1px solid #1e1e26; }
    .status-row:last-child { border-bottom: none; }
    .ok { color: #34d399; }
    .warn { color: #fbbf24; }
    p.note { margin-top: 28px; font-size: 0.82rem; color: #4b5563; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Key<span>Chaos</span></div>
    <div class="tagline">Professional Password Generator for MSP Teams</div>
    <div class="badge">v1.2.0 · Docker/Web Edition</div>

    <div class="status" id="status">
      <div class="status-row">
        <span>Server</span>
        <span class="ok" id="srv-status">Checking…</span>
      </div>
      <div class="status-row">
        <span>Version</span>
        <span id="srv-version">—</span>
      </div>
      <div class="status-row">
        <span>PwdPush</span>
        <span id="push-status">—</span>
      </div>
    </div>

    <p class="note">Full UI is under active development.<br />The backend API and PwdPush proxy are operational.</p>
  </div>

  <script>
    (async () => {
      try {
        const h = await fetch('/api/health');
        const d = await h.json();
        document.getElementById('srv-status').textContent = '✓ Online';
        document.getElementById('srv-version').textContent = d.version;
      } catch {
        document.getElementById('srv-status').textContent = 'Unreachable';
        document.getElementById('srv-status').className = 'warn';
      }

      try {
        const r = await fetch('/api/pwdpush/test');
        const d = await r.json();
        const el = document.getElementById('push-status');
        if (d.ok) {
          el.textContent = `✓ ${d.edition || 'Connected'} ${d.version || ''}`.trim();
          el.className = 'ok';
        } else {
          el.textContent = 'Not configured';
          el.className = 'warn';
        }
      } catch {
        document.getElementById('push-status').textContent = 'Not configured';
        document.getElementById('push-status').className = 'warn';
      }
    })();
  </script>
</body>
</html>
