services:
  keychaos:
    image: keychaos:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      KC_AUTH_USER: ${KC_AUTH_USER:?KC_AUTH_USER is required}
      KC_AUTH_PASS: ${KC_AUTH_PASS:?KC_AUTH_PASS is required}
      # KC_AUTH_DISABLED: "true"   # Uncomment only behind a trusted reverse proxy
      PWD_PUSH_URL: ${PWD_PUSH_URL:-https://pwpush.com}
      PWD_PUSH_TOKEN: ${PWD_PUSH_TOKEN:-}
      PWD_PUSH_API_VERSION: ${PWD_PUSH_API_VERSION:-v2}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

