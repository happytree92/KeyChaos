services:
  keychaos:
    image: ghcr.io/happytree92/keychaos:latest
    container_name: keychaos
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      # ─── PwdPush ─────────────────────────────────────────────────────────────
      PWD_PUSH_URL:     ${PWD_PUSH_URL:-https://pwpush.com}
      PWD_PUSH_VERSION: ${PWD_PUSH_VERSION:-v2}
      PWD_PUSH_TOKEN:   ${PWD_PUSH_TOKEN:-}
      # ─── Rate Limits ─────────────────────────────────────────────────────────
      RATE_LIMIT_PER_MIN:  ${RATE_LIMIT_PER_MIN:-20}
      RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR:-200}
    # Logs go to systemd journal on the host — no files inside the container.
    # Query with: journalctl -t keychaos -f
    # Persist through container restarts and survive docker stop/start.
    logging:
      driver: journald
      options:
        tag: keychaos
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

