# KeyChaos — nginx reverse proxy with TLS
# Place your cert and key at nginx/certs/keychaos.crt and nginx/certs/keychaos.key
# then mount them via docker-compose volumes.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/keychaos.crt;
    ssl_certificate_key /etc/nginx/certs/keychaos.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass         http://keychaos:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Timeouts — generous for slow PwdPush calls
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
